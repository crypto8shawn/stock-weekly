name: weekly-data-collection

on:
  schedule:
    - cron: '30 22 * * 5'   # 매주 토요일 07:30 KST (금 22:30 UTC)
  workflow_dispatch:         # 수동 실행 허용

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly analysis
        run: python analyze.py

      - name: Commit results
        run: |
          git config user.name "weekly-bot"
          git config user.email "weekly-bot@users.noreply.github.com"
          git add -f reports/weekly_analysis.json charts/*.png
          git commit -m "weekly data $(date -u +%F)" || echo "no changes to commit"
          git push

  publish:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest data commit
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Publish Notion report
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PARENT_PAGE_ID: 395197a4-7d61-8168-a75e-c80282dc0866
        run: python report_builder.py
